name: Protocol Library Tests

on:
  push:
    paths:
      - 'libs/rocket-protocol/**'
  pull_request:
    paths:
      - 'libs/rocket-protocol/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        working-directory: libs/rocket-protocol
        run: cmake -B build -DROCKET_PROTOCOL_BUILD_TESTS=ON

      - name: Build
        working-directory: libs/rocket-protocol
        run: cmake --build build

      - name: Run tests
        working-directory: libs/rocket-protocol
        run: ctest --test-dir build --output-on-failure
