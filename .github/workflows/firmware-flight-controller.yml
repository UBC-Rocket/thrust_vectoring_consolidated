name: Firmware - Flight Controller

on:
  workflow_dispatch:
  push:
    paths:
      - 'embedded-software/firmware/ulysses-flight-controller/**'
      - 'embedded-software/firmware/libs/state_estimation/**'
      - 'embedded-software/firmware/libs/controls/**'
      - 'embedded-software/firmware/libs/sensors/**'
      - 'embedded-software/firmware/libs/log_records/**'
      - 'embedded-software/libs/rocket-protocol/**'
  pull_request:
    paths:
      - 'embedded-software/firmware/ulysses-flight-controller/**'
      - 'embedded-software/firmware/libs/state_estimation/**'
      - 'embedded-software/firmware/libs/controls/**'
      - 'embedded-software/firmware/libs/sensors/**'
      - 'embedded-software/firmware/libs/log_records/**'
      - 'embedded-software/libs/rocket-protocol/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ARM toolchain
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: '13.2.Rel1'

      - name: Configure CMake (Debug)
        working-directory: embedded-software/firmware/ulysses-flight-controller
        run: cmake --preset debug

      - name: Build (Debug)
        working-directory: embedded-software/firmware/ulysses-flight-controller
        run: cmake --build --preset debug

      - name: Upload firmware artifact
        if: startsWith(github.ref, 'refs/tags/firmware-fc/')
        uses: actions/upload-artifact@v4
        with:
          name: ulysses-firmware-${{ github.ref_name }}
          path: |
            embedded-software/firmware/ulysses-flight-controller/build/debug/ulysses.elf
            embedded-software/firmware/ulysses-flight-controller/build/debug/ulysses.bin
            embedded-software/firmware/ulysses-flight-controller/build/debug/ulysses.hex
